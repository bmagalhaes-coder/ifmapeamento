<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Salas IF</title>
    <link rel="stylesheet" href="pesquisa.css">
</head>
<body>
    <div class="container">
        <header class="header">
    <div class="header-content">
        <div class="logo-container">
            <img src="imagens/if.png" alt="IF Logo" class="if-logo">
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Digite o número da sala, curso e/ou ano de início aqui">
            <button id="clearBtn" class="clear-btn">&times;</button>
        </div>
    </div>
        </header>

        <main class="menu-list" id="menuList">
            <!-- Os itens serão gerados dinamicamente pelo JavaScript -->
        </main>
    </div>

    <script src="codigos.js"></script>
</body>
</html>
