<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Salas IF</title>
    <link rel="stylesheet" href="pesquisa.css">
</head>
<body>

    <div class="container">
        <header class="header" id="headerFixo">
            <div class="header-content">
                <div class="logo-container">
                    <img src="imagens/if.png" alt="IF Logo" class="if-logo">
                </div>
                
                <input type="text" id="searchInput" placeholder="Buscar sala, curso ou setor...">
                
                <button id="clearBtn" class="clear-btn" aria-label="Limpar busca">&times;</button>
            </div>
        </header>

        <main class="menu-list" id="menuList">
            <button class="menu-item">SAA</button>
            <button class="menu-item">CINE TEATRO</button>
            <button class="menu-item">IFCast</button>
            <button class="menu-item">REFEITÓRIO</button>
            <button class="menu-item">LANCHONETE</button>
            <button class="menu-item">BIBLIOTECA</button>
            <button class="menu-item">DRG</button>
            <button class="menu-item">NRH</button>
            <button class="menu-item">DDE</button>
            <button class="menu-item">DGP/NGP</button>
            <button class="menu-item">COPA</button>
            <button class="menu-item">SERVIÇO SOCIAL</button>
            <button class="menu-item">DIRETORIA</button>
            <button class="menu-item">LAVABO</button>
            <button class="menu-item">COZINHA</button>
        </main>
    </div>

    <script src="codigos.js"></script>
</body>
</html>
