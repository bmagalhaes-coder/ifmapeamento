<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu de Salas IF - Remasterizado</title>
    <link rel="stylesheet" href="pesquisa.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img src="imagens/if.png" alt="IF Logo" class="if-logo">
                </div>
                
                <div class="search-wrapper">
                    <span class="search-icon"></span>
                    <input type="text" id="searchInput" placeholder="Buscar sala, curso ou setor...">
                    <button id="clearBtn" class="clear-btn" aria-label="Limpar busca">&times;</button>
                </div>
            </div> 
        </header>

        <main class="menu-list" id="menuList">
            </main>
    </div>

    <script src="codigos.js"></script>
</body>
</html>
