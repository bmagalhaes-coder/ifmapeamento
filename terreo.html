<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa - Térreo</title>
    
    <!-- Importante: O CSS de botões deve ser carregado -->
    <link rel="stylesheet" href="mapas.css">
    <link rel="stylesheet" href="botoes-fotos.css">
    <link rel="stylesheet" href="pesquisa.css"> 
</head>
<body>

    <div class="mapa-container">
        <!-- A classe 'mapa' é usada pelo JS para encontrar este elemento -->
        <img src="imagens/terreo.png" alt="Mapa do térreo" class="mapa">
    </div>

    <div class="andar-botoes">
        <a href="primeiroandar.html">
            <button class="andar">1º andar</button>
        </a>
        <button class="andar ativo">Térreo</button>
    </div>

    <div class="pesquisa">
        <button class="botao-pesquisa" onclick="window.location.href='pesquisa.html'">Pesquisar sala</button>
    </div>

    <script src="pesquisa.js"></script>
    <script src="botoes-foto-terreo.js"></script>
</body>
</html>
